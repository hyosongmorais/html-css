<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PseudoClasses</title>
    <style>
        div{
            display: inline-block;  /* Alinha as 3 div's */
            background-color: lightgray;
            text-align: center;
            border: 1px solid black;
            height: 200px;  /* Altura */
            width: 200px;   /* Largura */
        }
        /*  : -> as PseudoClasses tem que esta relacionadas há um elemento ou classe, SÃO relacionadas tambem a estado de um determinado elemento  */
        div:hover{
            background-color: yellow;
        }
    </style>
</head>
<body>
    <div id="d1">01</div>
    <div id="d2">02</div>
    <div id="d3">03</div>
</body>
</html>
