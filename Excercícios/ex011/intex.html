<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5</title>
</head>
<body>
    <h1>Imagens dinâmicas </h1>
    <p>Tente abrir esse site em vários dispositivos diferentes ou simplesmente aumente e diminua o tamanho do seu navegador</p>
    <picture>
        <source media="(max-width: 750px)" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/foto-m.png" type="image/png">
        <img src="./imagens /foto-g.png" alt="">
    </picture>
    <h1>Reproduzindo Áudio</h1>
    <p>Vamos aprender a reproduzir áudios em html5 </p>
    <audio preload="metadata" autoplay controls> 
        <!--O parâmetro preload nos da 3 opções,
        AUTO(so comeca a tocar quando carregar todo o site, inclusive o audio de 3 hrs que vc tem no site.) 
        METADATA(vai carregar somente os dados do arquivo, nome, duração, etc.)
        NONE (so carrega se vc clicar no audio)
        Tem um parâmetro LOOP que vai deixar o audio no loop tbm. -->
        <source src="./media/guanacast-33.mp3" type="audio/mpeg">
        <source src="./media/guanacast-33.ogg" type="audio/ogg">
        <source src="./media/guanacast-33.wav" type="audio/wav">
        <p>infeizmente seu navegador não consegue reproduzir áudio <a href="media/guanacast-33.mp3">clique aqui para baixar o arquivo MP3</a></p>
    </audio>
    <!--A tag <audio src="">, geralmente funciona com mais facilidade em MP3, WAV, OGG-->
</body>
</html>
