<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title>
    <style>
        h1{  /* box-level */
            background-color: lightgray;
            height: 300px; /* altura */
            width: 300px;  /* largura */

            border-width: 10px;  /* largura da borda */
            border-style: solid;
            border-color: darkslategray;

            /* Shortshand
            border: 10px solid darkslategray; */

            padding-top: 10px;  /* acolchoamento entre o h1 e a border, top pq é em cima. */
            padding-right: 10px;   /* o padding tem uma seguencia, top, right, bottom and left */
            padding-bottom: 10px;
            padding-left: 10px;

            /* Shortshand
            padding: 10px 10px 10px 10px; */

            margin-top: 20px;
            margin-right: 20px;
            margin-bottom: 40px;
            margin-left: 20px; 

            /* Shortshand
            margin 20px auto 20px auto; */

            /* margin: auto;  margin auto, para centralizar caixas e text-align auto,  para texto */

            outline-width: 5px;
            outline-style: dashed;
            outline-color: salmon ;

            /* Shortshand
            outline: 5px dashed salmon; */

        }
        
        a{ /* inline-level */
            border-width: 10px;
            border-style: solid;
            border-color: red;

            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;
        }
    </style>
</head>
<body>
    <h1>Exemplo de Caixas Block-level</h1>
    <p>Parágrafos também são exemplos de box-level, mas os <a href="#">links são exemplos de caixas inline-level</a>. Vamos ver como tudo isso funciona.</p>
    
</body>
</html>
