<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style> /* Existe um site que chamado, daFont.com que voce consegue baixar fontes especificas.  */
        @font-face {
            font-family: 'medieval';
            src: url('./fonts/old_london/Olondona.otf') format('opentype'), url('./fonts/old_london/OldLondon.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;

            /*
                Tipos de format()
                - opentype (otf)
                - truetype (ttf)
                - embedded-opentype
                - truetype-eat(Apple advanced Typography)
                - svg
            
            */
        }
        body{
            font-family: Arial, Helvetica, sans-serif;
            
        }
        h1{
            font-family: 'medieval', Times, serif;
            font-size: 3em;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <h1>Olá, Mundo!</h1>
    <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Quisquam sed molestias animi hic sint perferendis consequatur, enim officiis suscipit, natus ab tempora voluptate debitis saepe necessitatibus inventore, eum placeat praesentium!</p>
</body>
</html>
